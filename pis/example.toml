# pis/example.toml — registry exemplar. One file per Pi.
[pi]
ssh_host = "example.local"   # mDNS name or static IP
user     = "pi"
ble_name = "piloop-example"  # what the bridge advertises = what tab-device's `connect ble` picks

[notes]
text = """
Example Pi entry. Copy to pis/<your-name>.toml and edit ssh_host + ble_name.
ble_name must match the BLE_NAME baked into the image (image/stage-piloop config).
"""
